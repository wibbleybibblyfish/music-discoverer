<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Music Discoverer</title>
<style>
  :root {
    --bg: #0a0a12;
    --surface: #12121f;
    --surface2: #1a1a2e;
    --border: #2a2a44;
    --text: #e0e0f0;
    --text-dim: #8888aa;
    --accent: #6c5ce7;
    --accent-glow: #a29bfe;
    --green: #00cec9;
    --red: #ff6b6b;
    --youtube: #FF0000;
    --reddit: #FF4500;
    --deezer: #A238FF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    margin-bottom: 20px;
    transition: color 0.15s;
  }

  .back-link:hover { color: var(--accent-glow); }

  .back-link svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent-glow), #fd79a8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 28px;
  }

  .section {
    margin-bottom: 32px;
  }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  /* Genre accordion */
  .genre-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .genre-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .genre-header:hover { background: var(--surface2); }

  .genre-chevron {
    width: 16px;
    height: 16px;
    fill: var(--text-dim);
    margin-right: 10px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .genre-block.expanded .genre-chevron { transform: rotate(90deg); }

  .genre-name {
    font-size: 15px;
    font-weight: 600;
    flex: 1;
  }

  .genre-count {
    font-size: 11px;
    color: var(--text-dim);
    margin-right: 12px;
  }

  .genre-delete {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.15s;
  }

  .genre-delete:hover { color: var(--red); }

  .genre-body {
    display: none;
    padding: 0 16px 16px;
  }

  .genre-block.expanded .genre-body { display: block; }

  /* Source group */
  .source-group {
    margin-top: 14px;
  }

  .source-group-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .source-group-title.youtube { color: var(--youtube); }
  .source-group-title.reddit { color: var(--reddit); }
  .source-group-title.deezer { color: var(--deezer); }

  .source-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 8px;
    background: var(--surface2);
    border-radius: 6px;
    margin-bottom: 4px;
    font-size: 13px;
    transition: background 0.1s;
  }

  .source-row:hover { background: rgba(42, 42, 68, 0.8); }

  .source-name {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .source-delete {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .source-delete:hover { color: var(--red); }

  /* Toggle switch */
  .toggle {
    position: relative;
    width: 34px;
    height: 18px;
    flex-shrink: 0;
  }

  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
  }

  .toggle-track {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--border);
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .toggle-track::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--text-dim);
    top: 2px;
    left: 2px;
    transition: transform 0.2s, background 0.2s;
  }

  .toggle input:checked + .toggle-track {
    background: var(--accent);
  }

  .toggle input:checked + .toggle-track::after {
    transform: translateX(16px);
    background: #fff;
  }

  /* Add source row */
  .add-row {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }

  .add-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .add-row input:focus { border-color: var(--accent); }

  .add-row input::placeholder { color: var(--text-dim); }

  .btn {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { border-color: var(--accent); }

  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    font-weight: 600;
  }

  .btn-accent:hover { background: var(--accent-glow); }

  .btn-danger {
    color: var(--red);
    border-color: var(--red);
  }

  .btn-danger:hover { background: rgba(255, 107, 107, 0.1); }

  /* General settings */
  .setting-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
  }

  .setting-label {
    font-size: 13px;
    font-weight: 500;
    flex: 1;
  }

  .setting-value {
    font-size: 13px;
    color: var(--accent-glow);
  }

  .setting-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 13px;
    width: 80px;
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
  }

  .setting-input:focus { border-color: var(--accent); }

  .setting-suffix {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* Data management */
  .data-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 100;
  }

  .toast.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .toast.error {
    border-color: var(--red);
    color: var(--red);
  }
</style>
</head>
<body>

<div class="container">
  <a href="/" class="back-link">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Back to player
  </a>

  <h1>Settings</h1>

  <div class="section">
    <div class="section-title">Genres & Sources</div>
    <div id="genres-container"></div>
  </div>

  <div class="section">
    <div class="section-title">General</div>
    <div class="setting-row">
      <span class="setting-label">Fetch interval</span>
      <input type="number" class="setting-input" id="fetch-interval" min="1" max="168" value="6">
      <span class="setting-suffix">hours</span>
    </div>
    <div class="setting-row">
      <span class="setting-label">Tracks in database</span>
      <span class="setting-value" id="track-count">—</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Data Management</div>
    <div class="data-actions">
      <button class="btn btn-danger" onclick="resetRatings()">Reset All Ratings</button>
      <button class="btn btn-danger" onclick="clearDatabase()">Clear Database</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let config = null;

async function api(path, opts) {
  const res = await fetch(path, opts);
  return res.json();
}

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = isError ? 'toast error visible' : 'toast visible';
  setTimeout(() => el.classList.remove('visible'), 2000);
}

async function loadConfig() {
  config = await api('/api/config');
  renderGenres();
  document.getElementById('fetch-interval').value = config.fetch_interval_hours || 6;
}

async function loadTrackCount() {
  const stats = await api('/api/stats');
  document.getElementById('track-count').textContent = stats.total_tracks + ' tracks';
}

async function saveConfig() {
  await api('/api/config/sources', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(config),
  });
  toast('Saved');
}

function renderGenres() {
  const container = document.getElementById('genres-container');
  container.innerHTML = '';

  for (let gi = 0; gi < (config.genres || []).length; gi++) {
    const genre = config.genres[gi];
    const sources = genre.sources || {};
    const block = document.createElement('div');
    block.className = 'genre-block';
    block.dataset.index = gi;

    const totalSources =
      (sources.youtube || []).length +
      (sources.reddit || []).length +
      (sources.deezer_playlists || []).length +
      (sources.deezer_searches || []).length;

    block.innerHTML = `
      <div class="genre-header" onclick="toggleGenre(this)">
        <svg class="genre-chevron" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        <span class="genre-name">${escHtml(genre.name)}</span>
        <span class="genre-count">${totalSources} source${totalSources !== 1 ? 's' : ''}</span>
        <button class="genre-delete" onclick="event.stopPropagation();deleteGenre(${gi})" title="Delete genre">&times;</button>
      </div>
      <div class="genre-body">
        ${renderSourceGroup(gi, 'youtube', 'YouTube Channels', sources.youtube || [])}
        ${renderSourceGroup(gi, 'reddit', 'Reddit Subreddits', sources.reddit || [])}
        ${renderSourceGroup(gi, 'deezer_playlists', 'Deezer Playlists', sources.deezer_playlists || [])}
        ${renderSearchGroup(gi, sources.deezer_searches || [])}
      </div>
    `;

    container.appendChild(block);
  }
}

function renderSourceGroup(gi, type, title, items) {
  const cssClass = type === 'deezer_playlists' ? 'deezer' : type;
  let html = `<div class="source-group">
    <div class="source-group-title ${cssClass}">${title}</div>`;

  for (let si = 0; si < items.length; si++) {
    const item = items[si];
    const name = item.name || item.sub || item.id || '';
    const enabled = item.enabled !== false;
    html += `
      <div class="source-row">
        <label class="toggle">
          <input type="checkbox" ${enabled ? 'checked' : ''} onchange="toggleSource(${gi},'${type}',${si},this.checked)">
          <span class="toggle-track"></span>
        </label>
        <span class="source-name">${escHtml(name)}</span>
        <button class="source-delete" onclick="deleteSource(${gi},'${type}',${si})" title="Remove">&times;</button>
      </div>`;
  }

  let placeholder = '';
  let addField = '';
  if (type === 'youtube') {
    placeholder = 'Channel URL or ID';
    addField = `<div class="add-row">
      <input type="text" placeholder="${placeholder}" id="add-yt-${gi}" onkeydown="if(event.key==='Enter')addYouTube(${gi})">
      <button class="btn btn-accent" onclick="addYouTube(${gi})">Add</button>
    </div>`;
  } else if (type === 'reddit') {
    placeholder = 'Subreddit name (e.g. vocaltrance)';
    addField = `<div class="add-row">
      <input type="text" placeholder="${placeholder}" id="add-reddit-${gi}" onkeydown="if(event.key==='Enter')addReddit(${gi})">
      <button class="btn btn-accent" onclick="addReddit(${gi})">Add</button>
    </div>`;
  } else if (type === 'deezer_playlists') {
    placeholder = 'Playlist URL or ID';
    addField = `<div class="add-row">
      <input type="text" placeholder="${placeholder}" id="add-deezer-${gi}" onkeydown="if(event.key==='Enter')addDeezerPlaylist(${gi})">
      <button class="btn btn-accent" onclick="addDeezerPlaylist(${gi})">Add</button>
    </div>`;
  }

  html += addField + '</div>';
  return html;
}

function renderSearchGroup(gi, searches) {
  let html = `<div class="source-group">
    <div class="source-group-title deezer">Deezer Searches</div>`;

  for (let si = 0; si < searches.length; si++) {
    html += `
      <div class="source-row">
        <span class="source-name">${escHtml(searches[si])}</span>
        <button class="source-delete" onclick="deleteSearch(${gi},${si})" title="Remove">&times;</button>
      </div>`;
  }

  html += `<div class="add-row">
    <input type="text" placeholder="Search term" id="add-search-${gi}" onkeydown="if(event.key==='Enter')addSearch(${gi})">
    <button class="btn btn-accent" onclick="addSearch(${gi})">Add</button>
  </div></div>`;

  return html;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toggleGenre(header) {
  header.parentElement.classList.toggle('expanded');
}

async function deleteGenre(gi) {
  const name = config.genres[gi].name;
  if (!confirm(`Delete genre "${name}" and all its sources?`))
    return;
  await api('/api/genres/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name }),
  });
  config.genres.splice(gi, 1);
  renderGenres();
  toast('Genre deleted');
}

async function toggleSource(gi, type, si, enabled) {
  config.genres[gi].sources[type][si].enabled = enabled;
  await saveConfig();
}

async function deleteSource(gi, type, si) {
  config.genres[gi].sources[type].splice(si, 1);
  await saveConfig();
  renderGenres();
}

async function deleteSearch(gi, si) {
  config.genres[gi].sources.deezer_searches.splice(si, 1);
  await saveConfig();
  renderGenres();
}

function extractYouTubeChannelId(input) {
  input = input.trim();
  // Already a channel ID
  if (/^UC[a-zA-Z0-9_-]{22}$/.test(input))
    return { id: input, name: input };
  // URL patterns
  const match = input.match(/youtube\.com\/(?:channel\/|c\/|@)([a-zA-Z0-9_-]+)/);
  if (match)
    return { id: match[1], name: match[1] };
  // Bare handle
  if (input.startsWith('@'))
    return { id: input, name: input };
  return { id: input, name: input };
}

async function addYouTube(gi) {
  const el = document.getElementById(`add-yt-${gi}`);
  const raw = el.value.trim();
  if (!raw) return;
  const { id, name } = extractYouTubeChannelId(raw);
  config.genres[gi].sources.youtube = config.genres[gi].sources.youtube || [];
  config.genres[gi].sources.youtube.push({ name, id, enabled: true });
  el.value = '';
  await saveConfig();
  renderGenres();
}

async function addReddit(gi) {
  const el = document.getElementById(`add-reddit-${gi}`);
  let raw = el.value.trim();
  if (!raw) return;
  raw = raw.replace(/^\/?(r\/)?/, '');
  config.genres[gi].sources.reddit = config.genres[gi].sources.reddit || [];
  config.genres[gi].sources.reddit.push({ name: `r/${raw}`, sub: raw, enabled: true });
  el.value = '';
  await saveConfig();
  renderGenres();
}

function extractDeezerPlaylistId(input) {
  input = input.trim();
  if (/^\d+$/.test(input))
    return input;
  const match = input.match(/deezer\.com\/(?:\w+\/)?playlist\/(\d+)/);
  if (match)
    return match[1];
  return input;
}

async function addDeezerPlaylist(gi) {
  const el = document.getElementById(`add-deezer-${gi}`);
  const raw = el.value.trim();
  if (!raw) return;
  const id = extractDeezerPlaylistId(raw);
  config.genres[gi].sources.deezer_playlists = config.genres[gi].sources.deezer_playlists || [];
  config.genres[gi].sources.deezer_playlists.push({ name: `Playlist ${id}`, id, enabled: true });
  el.value = '';
  await saveConfig();
  renderGenres();
}

async function addSearch(gi) {
  const el = document.getElementById(`add-search-${gi}`);
  const raw = el.value.trim();
  if (!raw) return;
  config.genres[gi].sources.deezer_searches = config.genres[gi].sources.deezer_searches || [];
  config.genres[gi].sources.deezer_searches.push(raw);
  el.value = '';
  await saveConfig();
  renderGenres();
}

async function resetRatings() {
  if (!confirm('Reset all ratings? This cannot be undone.'))
    return;
  await api('/api/reset', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: '{}',
  });
  toast('All ratings reset');
}

async function clearDatabase() {
  if (!confirm('Clear ALL discovered tracks? This cannot be undone.'))
    return;
  await api('/api/tracks', { method: 'DELETE' });
  toast('Database cleared');
  loadTrackCount();
}

// Fetch interval auto-save
document.getElementById('fetch-interval').addEventListener('change', async function () {
  const val = parseInt(this.value, 10);
  if (isNaN(val) || val < 1) return;
  config.fetch_interval_hours = val;
  await saveConfig();
});

(async () => {
  await Promise.all([loadConfig(), loadTrackCount()]);
})();
</script>

</body>
</html>
